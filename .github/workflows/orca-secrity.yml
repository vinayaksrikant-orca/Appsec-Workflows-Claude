# ============================================================
# Orca Security — SAST Scan Only
# Shows findings INLINE in PR comment — no Security tab needed
# ============================================================

name: Orca SAST Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

  push:
    branches:
      - main
      - master
      - develop

  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      fail_on_findings:
        description: 'Fail pipeline if issues found?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: orca-sast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  PROJECT_KEY: testing-project-vinayak
  FAIL_ON_FINDINGS: ${{ github.event.inputs.fail_on_findings || 'true' }}

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — SAST Scan
  # ──────────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      exit_code: ${{ steps.scan.outputs.exit_code }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Orca SAST Scan
        id: scan
        continue-on-error: true
        uses: orcasecurity/shiftleft-sast-action@v1
        with:
          api_token:        ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key:      ${{ env.PROJECT_KEY }}
          path:             "."
          format:           "sarif"
          output:           "results/"
          show_annotations: true

      - name: Debug — list results
        if: always()
        run: ls -la results/ || echo "results/ directory is empty or missing"

      - name: Upload SAST SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/sast.sarif
          category:   orca-sast

      - name: Upload SAST artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           orca-sast-results
          path:           results/sast.sarif
          retention-days: 30

      - name: Write to job summary
        if: always()
        run: |
          EXIT="${{ steps.scan.outputs.exit_code }}"
          STATUS=$([ "$EXIT" == "0" ] \
            && echo "✅ No issues found" \
            || echo "❌ Issues found (exit code: $EXIT)")
          echo "### SAST Scan"                                          >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $STATUS"                                    >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.head_ref || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}"                         >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Summary with INLINE findings in PR comment
  # Parses SARIF file and shows findings directly in comment
  # ──────────────────────────────────────────────────────────
  sast-summary:
    name: SAST Summary
    runs-on: ubuntu-latest
    needs: sast-scan
    if: always()
    steps:

      - name: Evaluate result
        id: evaluate
        run: |
          EXIT="${{ needs.sast-scan.outputs.exit_code }}"
          echo "SAST exit code: $EXIT"
          if [ "$EXIT" == "0" ]; then
            echo "sast_pass=true"  >> $GITHUB_OUTPUT
          else
            echo "sast_pass=false" >> $GITHUB_OUTPUT
          fi

      # Download the SARIF artifact from the scan job
      - name: Download SAST artifact
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: orca-sast-results
          path: results/
        continue-on-error: true   # in case artifact doesn't exist

      - name: Debug — list downloaded files
        if: always()
        run: ls -la results/ || echo "No results downloaded"

      - name: Post PR comment with inline findings
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const exit_code = '${{ needs.sast-scan.outputs.exit_code }}';
            const pass      = ${{ steps.evaluate.outputs.sast_pass }};

            // ── Parse SARIF for findings ──────────────────
            let findingsTable = '';
            let totalFindings = 0;
            let critical = 0, high = 0, medium = 0, low = 0;

            try {
              const sarifPath = 'results/sast.sarif';

              if (fs.existsSync(sarifPath)) {
                const sarif = JSON.parse(fs.readFileSync(sarifPath, 'utf8'));
                const runs  = sarif.runs || [];

                // Collect all findings
                const findings = [];
                for (const run of runs) {
                  const rules = {};

                  // Build rule lookup for severity
                  for (const rule of (run.tool?.driver?.rules || [])) {
                    rules[rule.id] = {
                      name:     rule.name || rule.id,
                      severity: rule.properties?.['problem.severity']
                                || rule.defaultConfiguration?.level
                                || 'unknown',
                      desc:     rule.shortDescription?.text || rule.fullDescription?.text || ''
                    };
                  }

                  for (const result of (run.results || [])) {
                    totalFindings++;
                    const ruleInfo = rules[result.ruleId] || {};
                    const level    = result.level || ruleInfo.severity || 'note';
                    const loc      = result.locations?.[0]?.physicalLocation;
                    const file     = loc?.artifactLocation?.uri || 'unknown';
                    const line     = loc?.region?.startLine || '-';
                    const msg      = result.message?.text || ruleInfo.desc || '';

                    // Count by severity
                    if (level === 'error')   critical++;
                    else if (level === 'warning') high++;
                    else if (level === 'note')    medium++;
                    else low++;

                    const sevIcon = level === 'error'
                      ? '🔴 Critical'
                      : level === 'warning'
                        ? '🟠 High'
                        : level === 'note'
                          ? '🟡 Medium'
                          : '🔵 Low';

                    findings.push({
                      severity: sevIcon,
                      ruleId:   result.ruleId || 'unknown',
                      file:     file,
                      line:     line,
                      message:  msg.length > 120 ? msg.substring(0, 120) + '...' : msg
                    });
                  }
                }

                // Sort by severity (critical first)
                const sevOrder = { '🔴 Critical': 0, '🟠 High': 1, '🟡 Medium': 2, '🔵 Low': 3 };
                findings.sort((a, b) => (sevOrder[a.severity] || 9) - (sevOrder[b.severity] || 9));

                // Build findings table (max 20 rows to avoid huge comments)
                if (findings.length > 0) {
                  const shown    = findings.slice(0, 20);
                  const overflow = findings.length > 20
                    ? `\n> ⚠️ Showing first 20 of ${findings.length} findings.`
                    : '';

                  findingsTable = `
            | Severity | Rule | File | Line | Description |
            |----------|------|------|------|-------------|
            ${shown.map(f =>
              `| ${f.severity} | \`${f.ruleId}\` | \`${f.file}\` | ${f.line} | ${f.message} |`
            ).join('\n')}
            ${overflow}`;
                }

              } else {
                findingsTable = '\n> ⚠️ SARIF file not found — check Actions artifacts.';
              }

            } catch (err) {
              console.error('SARIF parse error:', err.message);
              findingsTable = `\n> ⚠️ Could not parse findings: ${err.message}`;
            }

            // ── Build PR comment body ─────────────────────
            const icon   = pass ? '✅' : '❌';
            const status = pass ? 'Pass' : `Fail (exit code: ${exit_code})`;

            // Summary counts line
            const counts = totalFindings > 0
              ? `🔴 ${critical} Critical &nbsp; 🟠 ${high} High &nbsp; 🟡 ${medium} Medium &nbsp; 🔵 ${low} Low`
              : '';

            const body = `## 🔐 Orca SAST Scan Result

            | Scan type | Status | Total findings |
            |-----------|--------|----------------|
            | SAST (source code) | ${icon} ${status} | ${totalFindings} |

            **Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
            **Commit:** \`${{ github.sha }}\`

            ${counts ? `**Severity breakdown:** ${counts}` : ''}

            ${totalFindings > 0
              ? `### 📋 Findings\n${findingsTable}`
              : '### 📋 Findings\n> ✅ No issues found in this scan.'}

            ${pass
              ? ''
              : '> ❌ Fix the issues above and push again to re-trigger the scan.\n> Merge is blocked until this scan passes.'}

            [View in Orca portal](https://app.us.orcasecurity.io)`;

            // ── Delete old bot comment ────────────────────
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('Orca SAST Scan Result')) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id
                });
              }
            }

            // ── Post fresh comment ────────────────────────
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         body
            });

      - name: Write job summary
        if: always()
        run: |
          echo "## 🔐 Orca SAST Scan Summary"   >> $GITHUB_STEP_SUMMARY
          echo ""                                >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"               >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"               >> $GITHUB_STEP_SUMMARY
          echo "| Scan  | SAST (source code) |" >> $GITHUB_STEP_SUMMARY
          echo "| Exit code | ${{ needs.sast-scan.outputs.exit_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.evaluate.outputs.sast_pass == 'true' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.head_ref || github.ref_name }} |"   >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |"  >> $GITHUB_STEP_SUMMARY

      - name: Fail if SAST found issues
        if: steps.evaluate.outputs.sast_pass == 'false' && env.FAIL_ON_FINDINGS == 'true'
        run: |
          echo "❌ SAST scan found issues."
          echo "   Exit code: ${{ needs.sast-scan.outputs.exit_code }}"
          echo ""
          echo "Fix the findings above and push again."
          exit 1
