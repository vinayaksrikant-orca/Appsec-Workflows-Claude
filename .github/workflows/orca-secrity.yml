name: Orca SAST Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      fail_on_findings:
        description: 'Fail pipeline if issues found?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: orca-sast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  PROJECT_KEY: testing-project-vinayak
  FAIL_ON_FINDINGS: ${{ github.event.inputs.fail_on_findings || 'true' }}

jobs:

  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      exit_code: ${{ steps.scan.outputs.exit_code }}
      sarif_exists: ${{ steps.check_sarif.outputs.sarif_exists }}
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Pre-flight: verify secrets and environment ──────────
      - name: Pre-flight checks
        run: |
          echo "=== Environment check ==="
          echo "PROJECT_KEY    : ${{ env.PROJECT_KEY }}"
          echo "Runner OS      : ${{ runner.os }}"
          echo "GitHub event   : ${{ github.event_name }}"
          echo "Branch         : ${{ github.head_ref || github.ref_name }}"
          echo ""
          echo "=== API token check ==="
          if [ -z "${{ secrets.ORCA_SECURITY_API_TOKEN }}" ]; then
            echo "❌ ORCA_SECURITY_API_TOKEN is EMPTY or NOT SET"
            echo "   → Go to: Repo → Settings → Secrets → Actions"
            echo "   → Add secret named: ORCA_SECURITY_API_TOKEN"
            exit 1
          else
            TOKEN_LEN=$(echo -n "${{ secrets.ORCA_SECURITY_API_TOKEN }}" | wc -c)
            echo "✅ ORCA_SECURITY_API_TOKEN is set (length: $TOKEN_LEN chars)"
          fi
          echo ""
          echo "=== Project key check ==="
          if [ "${{ env.PROJECT_KEY }}" == "your-project-key" ] || [ -z "${{ env.PROJECT_KEY }}" ]; then
            echo "❌ PROJECT_KEY is still placeholder or empty"
            exit 1
          else
            echo "✅ PROJECT_KEY: ${{ env.PROJECT_KEY }}"
          fi
          echo ""
          echo "=== Workspace files ==="
          ls -la
          echo ""
          echo "=== results/ directory pre-scan ==="
          mkdir -p results
          ls -la results/

      # ── Run the scan ────────────────────────────────────────
      - name: Run Orca SAST Scan
        id: scan
        continue-on-error: true
        uses: orcasecurity/shiftleft-sast-action@v1
        with:
          api_token: ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."
          format: "sarif"
          output: "results/"
          show_annotations: true

      # ── Post-scan diagnostics ───────────────────────────────
      - name: Post-scan diagnostics
        if: always()
        run: |
          echo "=== Scan exit code ==="
          echo "steps.scan.outputs.exit_code : ${{ steps.scan.outputs.exit_code }}"
          echo "steps.scan.outcome           : ${{ steps.scan.outcome }}"
          echo ""
          echo "=== results/ directory after scan ==="
          ls -la results/ 2>/dev/null || echo "❌ results/ directory missing entirely"
          echo ""
          echo "=== All files in workspace ==="
          find . -name "*.sarif" 2>/dev/null | head -20
          find . -name "*.json"  -path "*/results/*" 2>/dev/null | head -10
          find . -name "*.log"   2>/dev/null | head -10
          echo ""
          echo "=== Any Orca output files ==="
          find . -name "orca*" 2>/dev/null | head -20
          echo ""
          echo "=== Environment variables from scan action ==="
          env | grep -i orca || echo "No ORCA env vars found"

      # ── Check if SARIF was produced ─────────────────────────
      - name: Check SARIF exists
        id: check_sarif
        if: always()
        run: |
          if [ -f "results/sast.sarif" ]; then
            SIZE=$(wc -c < results/sast.sarif)
            echo "✅ results/sast.sarif exists (size: $SIZE bytes)"
            echo "sarif_exists=true" >> $GITHUB_OUTPUT

            echo ""
            echo "=== SARIF file preview (first 50 lines) ==="
            head -50 results/sast.sarif

          else
            echo "❌ results/sast.sarif does NOT exist"
            echo "sarif_exists=false" >> $GITHUB_OUTPUT

            echo ""
            echo "=== Checking for alternative SARIF filenames ==="
            find results/ -name "*.sarif" 2>/dev/null || echo "No .sarif files found in results/"
            find . -name "*.sarif" 2>/dev/null || echo "No .sarif files anywhere in workspace"

            echo ""
            echo "=== Possible causes ==="
            echo "1. ORCA_SECURITY_API_TOKEN is invalid or expired"
            echo "2. PROJECT_KEY does not exist in Orca portal"
            echo "3. Network connectivity issue to packages.orcasecurity.io"
            echo "4. Orca action crashed before writing output"
          fi

      # ── Debug SARIF severity fields ─────────────────────────
      - name: Debug show SARIF severity fields
        if: always()
        run: |
          if [ ! -f results/sast.sarif ]; then
            echo "No SARIF file found — skipping"
          else
            echo "" | base64 -d | python3 2>/dev/null || echo "Could not parse SARIF"
          fi

      # ── Upload SARIF only if it exists ──────────────────────
      - name: Upload SAST SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.check_sarif.outputs.sarif_exists == 'true'
        with:
          sarif_file: results/sast.sarif
          category: orca-sast

      - name: Skip SARIF upload — file not found
        if: always() && steps.check_sarif.outputs.sarif_exists != 'true'
        run: |
          echo "⚠️ Skipping SARIF upload — results/sast.sarif was not produced"
          echo "Check the Post-scan diagnostics step above for the root cause"

      - name: Upload SAST artifact
        uses: actions/upload-artifact@v4
        if: always() && steps.check_sarif.outputs.sarif_exists == 'true'
        with:
          name: orca-sast-results
          path: results/sast.sarif
          retention-days: 30

      - name: Write to job summary
        if: always()
        run: |
          EXIT="${{ steps.scan.outputs.exit_code }}"
          SARIF="${{ steps.check_sarif.outputs.sarif_exists }}"
          if [ "$SARIF" != "true" ]; then
            STATUS="⚠️ Scan did not produce output — check Pre-flight and Post-scan steps"
          elif [ "$EXIT" == "0" ]; then
            STATUS="✅ No issues found"
          else
            STATUS="❌ Issues found (exit code: $EXIT)"
          fi
          echo "### SAST Scan" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "**SARIF produced:** $SARIF" >> $GITHUB_STEP_SUMMARY
          echo "**Exit code:** $EXIT" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.head_ref || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  sast-summary:
    name: SAST Summary
    runs-on: ubuntu-latest
    needs: sast-scan
    if: always()
    steps:

      - name: Evaluate result
        id: evaluate
        run: |
          EXIT="${{ needs.sast-scan.outputs.exit_code }}"
          SARIF="${{ needs.sast-scan.outputs.sarif_exists }}"
          echo "SAST exit code  : $EXIT"
          echo "SARIF produced  : $SARIF"

          # Only pass if scan ran AND exit code is 0
          if [ "$SARIF" == "true" ] && [ "$EXIT" == "0" ]; then
            echo "sast_pass=true" >> $GITHUB_OUTPUT
          else
            echo "sast_pass=false" >> $GITHUB_OUTPUT
          fi

          # Flag if scan didn't produce output at all
          if [ "$SARIF" != "true" ]; then
            echo "scan_failed=true" >> $GITHUB_OUTPUT
          else
            echo "scan_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Download SAST artifact
        uses: actions/download-artifact@v4
        if: needs.sast-scan.outputs.sarif_exists == 'true'
        with:
          name: orca-sast-results
          path: results/
        continue-on-error: true

      - name: Write job summary
        if: always()
        run: |
          echo "## Orca SAST Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | SAST (source code) |" >> $GITHUB_STEP_SUMMARY
          echo "| Exit code | ${{ needs.sast-scan.outputs.exit_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SARIF produced | ${{ needs.sast-scan.outputs.sarif_exists }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.head_ref || github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment with inline findings
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exit_code   = '${{ needs.sast-scan.outputs.exit_code }}';
            const pass        = ${{ steps.evaluate.outputs.sast_pass }};
            const scan_failed = ${{ steps.evaluate.outputs.scan_failed }};

            // ── If scan didn't produce output — post diagnostic comment ──
            if (scan_failed) {
              const body = `## 🔐 Orca SAST Scan Result\n\n⚠️ **Scan did not produce output.** The Orca scanner failed before writing results.\n\n**Common causes:**\n- \`ORCA_SECURITY_API_TOKEN\` secret is missing, expired, or invalid\n- \`PROJECT_KEY\` (\`${{ env.PROJECT_KEY }}\`) does not exist in the Orca portal\n- Network connectivity issue from the runner to Orca's servers\n\n**To fix:**\n1. Go to: [Repo → Settings → Secrets → Actions](/${{ github.repository }}/settings/secrets/actions)\n2. Verify \`ORCA_SECURITY_API_TOKEN\` is set and not expired\n3. Check the **Pre-flight checks** step in the Actions log for details\n\n**Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`\n**Commit:** \`${{ github.sha }}\``;

              const comments = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              for (const c of comments.data) {
                if (c.user.type === 'Bot' && c.body.includes('Orca SAST Scan Result')) {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: c.id
                  });
                }
              }
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
              return;
            }

            // ── Normal flow — parse SARIF and post findings ──────────────
            function getSeverity(result, rulesArray) {
              const idx    = result.ruleIndex ?? 0;
              const rule   = rulesArray[idx] || {};
              const rProps = rule.properties || {};
              const score  = parseFloat(rProps['security-severity'] || '0');
              if (score >= 9.0) return 'CRITICAL';
              if (score >= 7.0) return 'HIGH';
              if (score >= 4.0) return 'MEDIUM';
              if (score >  0.0) return 'LOW';
              const level = rule.defaultConfiguration?.level || result.level || '';
              if (level === 'error')   return 'HIGH';
              if (level === 'warning') return 'MEDIUM';
              if (level === 'note')    return 'LOW';
              return 'MEDIUM';
            }
            function sevIcon(s) {
              return {CRITICAL:'🔴 Critical',HIGH:'🟠 High',MEDIUM:'🟡 Medium',LOW:'🔵 Low'}[s] || '⚪ Unknown';
            }
            function sevOrder(s) {
              return {CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3}[s] ?? 9;
            }

            let findingsTable = '';
            let totalFindings = 0;
            let critical = 0, high = 0, medium = 0, low = 0;

            try {
              if (fs.existsSync('results/sast.sarif')) {
                const sarif = JSON.parse(fs.readFileSync('results/sast.sarif', 'utf8'));
                for (const run of (sarif.runs || [])) {
                  const rulesArray = run.tool?.driver?.rules || [];
                  const findings = [];
                  for (const result of (run.results || [])) {
                    totalFindings++;
                    const sev      = getSeverity(result, rulesArray);
                    const rule     = rulesArray[result.ruleIndex ?? 0] || {};
                    const loc      = result.locations?.[0]?.physicalLocation;
                    const file     = loc?.artifactLocation?.uri || 'unknown';
                    const line     = loc?.region?.startLine || '-';
                    const desc     = result.message?.text || rule.shortDescription?.text || '';
                    const short    = desc.length > 100 ? desc.substring(0, 100) + '...' : desc;
                    const ruleName = rule.name || rule.shortDescription?.text || result.ruleId || 'unknown';
                    const shortRule= ruleName.length > 35 ? ruleName.substring(0, 35) + '...' : ruleName;
                    if (sev === 'CRITICAL') critical++;
                    else if (sev === 'HIGH') high++;
                    else if (sev === 'MEDIUM') medium++;
                    else low++;
                    findings.push({ sev, shortRule, file, line, short });
                  }
                  findings.sort((a, b) => sevOrder(a.sev) - sevOrder(b.sev));
                  if (findings.length > 0) {
                    const shown    = findings.slice(0, 25);
                    const overflow = findings.length > 25 ? `\n> Showing first 25 of **${findings.length}** findings.` : '';
                    findingsTable = '\n| Severity | Rule | File | Line | Description |\n|----------|------|------|------|-------------|\n'
                      + shown.map(f => `| ${sevIcon(f.sev)} | ${f.shortRule} | \`${f.file}\` | ${f.line} | ${f.short} |`).join('\n')
                      + overflow;
                  }
                }
              } else {
                findingsTable = '\n> SARIF file not found — check Actions artifacts.';
              }
            } catch(err) {
              findingsTable = `\n> Could not parse SARIF: ${err.message}`;
            }

            const icon   = pass ? '✅' : '❌';
            const status = pass ? 'Pass' : `Fail (exit code: ${exit_code})`;
            const counts = `🔴 ${critical} Critical   🟠 ${high} High   🟡 ${medium} Medium   🔵 ${low} Low`;
            const body = `## 🔐 Orca SAST Scan Result\n\n| Scan type | Status | Total findings |\n|-----------|--------|----------------|\n| SAST (source code) | ${icon} ${status} | ${totalFindings} |\n\n**Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`\n**Commit:** \`${{ github.sha }}\`\n\n**Severity breakdown:** ${counts}\n\n### Findings\n${totalFindings > 0 ? findingsTable : '> ✅ No issues found.'}\n\n${pass ? '' : '> ❌ Fix the issues above and push again to re-trigger the scan.'}\n\n[View in Orca portal](https://app.us.orcasecurity.io)`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('Orca SAST Scan Result')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id
                });
              }
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if SAST found issues
        if: steps.evaluate.outputs.sast_pass == 'false' && env.FAIL_ON_FINDINGS == 'true'
        run: |
          echo "SAST scan found issues or scan failed to produce output."
          echo "Exit code   : ${{ needs.sast-scan.outputs.exit_code }}"
          echo "SARIF exists: ${{ needs.sast-scan.outputs.sarif_exists }}"
          exit 1
