# ============================================================
# Orca Security — Combined Scan Workflow
# Runs on PRs targeting ANY branch — not just main/default
# ============================================================

name: Orca Security Scans

on:
  # ── Option 1: Scan PRs targeting ANY branch ──────────────
  # Remove the branches filter entirely under pull_request
  # This fires for every PR regardless of target branch
  pull_request:
    # NO branches filter here = triggers on ALL target branches
    # e.g. PR → main, PR → develop, PR → release/v2 all trigger
    types: [opened, synchronize, reopened]

  # ── Option 2: Scan pushes to specific branches ───────────
  # Add whichever branches your team works on
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"      # matches release/v1, release/v2 etc
      - "hotfix/**"       # matches hotfix/fix-login etc
      - "feature/**"      # matches any feature branch

  # ── Option 3: Manual trigger (test any branch on demand) ─
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch being scanned'
        required: false
        default: 'manual run'

  # ── Scheduled daily scan ─────────────────────────────────
  schedule:
    - cron: '0 0 * * *'

# ── Permissions ─────────────────────────────────────────────
permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write      # needed to post scan results as PR comment

# ── Global env ──────────────────────────────────────────────
env:
  PROJECT_KEY: your-project-key   # ← replace with your Orca project key

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — SAST Scan
  # ──────────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # For PRs — checkout the actual PR head not the merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Orca SAST Scan
        uses: orcasecurity/shiftleft-sast-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."
          output: "results/sast"
          format: "sarif"

      - name: Upload SAST SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/sast/
          category: orca-sast

      - name: Upload SAST artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-sast-results
          path: results/sast/
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 2 — IaC Scan
  # ──────────────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Orca IaC Scan
        uses: orcasecurity/shiftleft-iac-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "terraform,kubernetes,bicep"   # ← adjust to your dirs
          output: "results/iac"
          format: "sarif"

      - name: Upload IaC SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/iac/
          category: orca-iac

      - name: Upload IaC artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-iac-results
          path: results/iac/
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 3 — SCA Scan
  # ──────────────────────────────────────────────────────────
  sca-scan:
    name: SCA Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Orca SCA Scan
        uses: orcasecurity/shiftleft-sca-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."
          output: "results/sca"
          format: "sarif"

      - name: Upload SCA SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/sca/
          category: orca-sca

      - name: Upload SCA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-sca-results
          path: results/sca/
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 4 — Secrets Scan
  # ──────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Orca Secrets Scan
        uses: orcasecurity/shiftleft-secrets-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          output: "results/secrets"
          format: "sarif"

      - name: Upload Secrets SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/secrets/
          category: orca-secrets

      - name: Upload Secrets artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-secrets-results
          path: results/secrets/
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 5 — Summary + PR Comment
  # Posts scan result summary as a comment on the PR
  # ──────────────────────────────────────────────────────────
  scan-summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [sast-scan, iac-scan, sca-scan, secrets-scan]
    if: always()
    steps:

      - name: Print summary
        run: |
          echo "========================================"
          echo "        ORCA SECURITY SCAN SUMMARY      "
          echo "========================================"
          echo "Branch  : ${{ github.head_ref || github.ref_name }}"
          echo "Target  : ${{ github.base_ref || 'N/A' }}"
          echo "Commit  : ${{ github.sha }}"
          echo "SAST    : ${{ needs.sast-scan.result }}"
          echo "IaC     : ${{ needs.iac-scan.result }}"
          echo "SCA     : ${{ needs.sca-scan.result }}"
          echo "Secrets : ${{ needs.secrets-scan.result }}"
          echo "========================================"

      # Post results as a comment on the PR (only for PR events)
      - name: Post PR comment with scan results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const sast    = '${{ needs.sast-scan.result }}';
            const iac     = '${{ needs.iac-scan.result }}';
            const sca     = '${{ needs.sca-scan.result }}';
            const secrets = '${{ needs.secrets-scan.result }}';

            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️';

            const body = `
            ## 🔐 Orca Security Scan Results

            | Scan type | Result |
            |-----------|--------|
            | SAST (source code) | ${icon(sast)} ${sast} |
            | IaC (infra as code) | ${icon(iac)} ${iac} |
            | SCA (dependencies) | ${icon(sca)} ${sca} |
            | Secrets | ${icon(secrets)} ${secrets} |

            **Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
            **Commit:** \`${{ github.sha }}\`

            ${sast === 'failure' || iac === 'failure' || sca === 'failure' || secrets === 'failure'
              ? '> ⚠️ One or more scans found issues. Check the **Security** tab and **Actions** artifacts for details.'
              : '> ✅ All scans passed. No issues found.'}

            [View full results in Orca portal](https://app.us.orcasecurity.io)
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Fail the summary if any scan failed
      # Add THIS job to branch protection required checks
      - name: Fail if any scan failed
        if: |
          needs.sast-scan.result    == 'failure' ||
          needs.iac-scan.result     == 'failure' ||
          needs.sca-scan.result     == 'failure' ||
          needs.secrets-scan.result == 'failure'
        run: |
          echo "One or more Orca scans failed."
          echo "Check Security tab for details."
          exit 1
