# ============================================================
# Orca Security — SAST Scan Only (Enterprise Grade)
# Draft PR check removed — scans every PR and push event
# ============================================================

name: Orca SAST Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"

  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      fail_on_findings:
        description: 'Fail pipeline if issues found?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

# ── Cancel in-progress runs for same PR ─────────────────────
concurrency:
  group: orca-sast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  PROJECT_KEY: your-project-key    # ← replace with your Orca project key
  FAIL_ON_FINDINGS: ${{ github.event.inputs.fail_on_findings || 'true' }}

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — SAST Scan
  # Output SARIF: results/sast.sarif
  # Exit code:    0 = clean, >0 = findings
  # ──────────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      exit_code: ${{ steps.scan.outputs.exit_code }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Orca SAST Scan
        id: scan
        continue-on-error: true
        uses: orcasecurity/shiftleft-sast-action@v1
        with:
          api_token:        ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key:      ${{ env.PROJECT_KEY }}
          path:             "."
          format:           "sarif"
          output:           "results/"
          show_annotations: true

      - name: Debug — list results
        if: always()
        run: ls -la results/ || echo "results/ directory is empty or missing"

      - name: Upload SAST SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/sast.sarif
          category:   orca-sast

      - name: Upload SAST artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           orca-sast-results
          path:           results/sast.sarif
          retention-days: 30

      - name: Write to job summary
        if: always()
        run: |
          EXIT="${{ steps.scan.outputs.exit_code }}"
          STATUS=$([ "$EXIT" == "0" ] \
            && echo "✅ No issues found" \
            || echo "❌ Issues found (exit code: $EXIT)")
          echo "### SAST Scan"                                          >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $STATUS"                                    >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.head_ref || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}"                         >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Summary
  # Reads exit_code output — not step outcome or job result
  # Add "SAST Summary" to branch protection required checks
  # ──────────────────────────────────────────────────────────
  sast-summary:
    name: SAST Summary
    runs-on: ubuntu-latest
    needs: sast-scan
    if: always()
    steps:

      - name: Evaluate result
        id: evaluate
        run: |
          EXIT="${{ needs.sast-scan.outputs.exit_code }}"
          echo "SAST exit code: $EXIT"

          if [ "$EXIT" == "0" ]; then
            echo "sast_pass=true"  >> $GITHUB_OUTPUT
          else
            echo "sast_pass=false" >> $GITHUB_OUTPUT
          fi

      - name: Write job summary
        if: always()
        run: |
          echo "## 🔐 Orca SAST Scan Summary"   >> $GITHUB_STEP_SUMMARY
          echo ""                                >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"               >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"               >> $GITHUB_STEP_SUMMARY
          echo "| Scan  | SAST (source code) |" >> $GITHUB_STEP_SUMMARY
          echo "| Exit code | ${{ needs.sast-scan.outputs.exit_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.evaluate.outputs.sast_pass == 'true' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.head_ref || github.ref_name }} |"   >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |"  >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const exit_code = '${{ needs.sast-scan.outputs.exit_code }}';
            const pass      = ${{ steps.evaluate.outputs.sast_pass }};
            const icon      = pass ? '✅' : '❌';
            const status    = pass ? 'Pass' : `Fail (exit code: ${exit_code})`;

            const body = `## 🔐 Orca SAST Scan Result

            | Scan type | Status |
            |-----------|--------|
            | SAST (source code) | ${icon} ${status} |

            **Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
            **Commit:** \`${{ github.sha }}\`

            ${pass
              ? '> ✅ SAST scan passed. No issues found.'
              : '> ❌ SAST scan found issues. Check the **Security tab** and inline PR annotations for details.'}

            [View in Orca portal](https://app.us.orcasecurity.io) | [Security tab](/${{ github.repository }}/security/code-scanning)`;

            // Delete previous bot comment if exists
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('Orca SAST Scan Result')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id
                });
              }
            }

            // Post fresh comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if SAST found issues
        if: steps.evaluate.outputs.sast_pass == 'false' && env.FAIL_ON_FINDINGS == 'true'
        run: |
          echo "❌ SAST scan found issues."
          echo "   Exit code: ${{ needs.sast-scan.outputs.exit_code }}"
          echo ""
          echo "Check Security tab or PR annotations for details."
          exit 1
