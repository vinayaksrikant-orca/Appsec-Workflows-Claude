# ============================================================
# Orca Security — Combined Scan Workflow (FULLY FIXED)
# Fix 1: results/file_system.sarif for SCA (not sca.sarif)
# Fix 2: Removed continue-on-error from jobs so summary job
#         correctly detects failures and reports them
# ============================================================

name: Orca Security Scans

on:
  pull_request:
    types: [opened, synchronize, reopened]

  push:
    branches:
      - main
      - master

  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  PROJECT_KEY: testing-project-vinayak    # ← replace with your Orca project key

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — SAST
  # SARIF output: results/sast.sarif
  # ──────────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    # ── REMOVED continue-on-error: true ─────────────────────
    # Using outcome instead so summary can detect real failures
    outputs:
      outcome: ${{ steps.orcasecurity_sast_scan.outcome }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Orca SAST Scan
        id: orcasecurity_sast_scan
        # continue-on-error here (step level) so job continues
        # to upload even when scan finds issues
        continue-on-error: true
        uses: orcasecurity/shiftleft-sast-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."
          format: "sarif"
          output: "results/"

      - name: Upload SAST SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/sast.sarif      # ← correct filename
          category: orca-sast

      - name: Upload SAST artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-sast-results
          path: results/sast.sarif
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 2 — IaC
  # SARIF output: results/iac.sarif
  # ──────────────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.orcasecurity_iac_scan.outcome }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Orca IaC Scan
        id: orcasecurity_iac_scan
        continue-on-error: true
        uses: orcasecurity/shiftleft-iac-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."
          format: "sarif"
          output: "results/"

      - name: Upload IaC SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/iac.sarif       # ← correct filename
          category: orca-iac

      - name: Upload IaC artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-iac-results
          path: results/iac.sarif
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 3 — SCA (filesystem scan)
  # Action:      shiftleft-fs-action@v1
  # SARIF output: results/file_system.sarif  ← KEY FIX
  # ──────────────────────────────────────────────────────────
  sca-scan:
    name: SCA Scan
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.orcasecurity_sca_scan.outcome }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Orca SCA Scan
        id: orcasecurity_sca_scan
        continue-on-error: true
        uses: orcasecurity/shiftleft-fs-action@v1     # ← correct action
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."
          format: "sarif"
          output: "results/"

      - name: Upload SCA SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/file_system.sarif   # ← FIXED: was sca.sarif
          category: orca-sca

      - name: Upload SCA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-sca-results
          path: results/file_system.sarif         # ← FIXED
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 4 — Secrets
  # SARIF output: results/secrets.sarif
  # ──────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.orcasecurity_secrets_scan.outcome }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Orca Secrets Scan
        id: orcasecurity_secrets_scan
        continue-on-error: true
        uses: orcasecurity/shiftleft-secrets-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          format: "sarif"
          output: "results/"

      - name: Upload Secrets SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/secrets.sarif     # ← correct filename
          category: orca-secrets

      - name: Upload Secrets artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-secrets-results
          path: results/secrets.sarif
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 5 — Summary
  # Reads step-level outcomes (not job-level results) so
  # continue-on-error doesn't mask real failures
  # ──────────────────────────────────────────────────────────
  scan-summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [sast-scan, iac-scan, sca-scan, secrets-scan]
    if: always()
    steps:

      - name: Print summary
        run: |
          echo "========================================"
          echo "      ORCA SECURITY SCAN SUMMARY        "
          echo "========================================"
          echo "Branch  : ${{ github.head_ref || github.ref_name }}"
          echo "Target  : ${{ github.base_ref || 'push' }}"
          echo "SAST    : ${{ needs.sast-scan.outputs.outcome }}"
          echo "IaC     : ${{ needs.iac-scan.outputs.outcome }}"
          echo "SCA     : ${{ needs.sca-scan.outputs.outcome }}"
          echo "Secrets : ${{ needs.secrets-scan.outputs.outcome }}"
          echo "========================================"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const r = {
              sast:    '${{ needs.sast-scan.outputs.outcome }}',
              iac:     '${{ needs.iac-scan.outputs.outcome }}',
              sca:     '${{ needs.sca-scan.outputs.outcome }}',
              secrets: '${{ needs.secrets-scan.outputs.outcome }}'
            };
            const icon = s => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';
            const anyFail = Object.values(r).some(s => s === 'failure');
            const body = `## 🔐 Orca Security Scan Results

            | Scan | Result |
            |------|--------|
            | SAST (source code) | ${icon(r.sast)} ${r.sast} |
            | IaC (infra as code) | ${icon(r.iac)} ${r.iac} |
            | SCA (dependencies) | ${icon(r.sca)} ${r.sca} |
            | Secrets | ${icon(r.secrets)} ${r.secrets} |

            **Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
            **Commit:** \`${{ github.sha }}\`

            ${anyFail
              ? '> ⚠️ One or more scans found issues. Check the **Security** tab for details.'
              : '> ✅ All scans passed. No issues found.'}

            [View full results in Orca portal](https://app.us.orcasecurity.io)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── Fail pipeline if any scan step failed ─────────────
      # Uses step outcomes not job results — avoids the
      # continue-on-error masking problem
      - name: Fail if any scan failed
        if: |
          needs.sast-scan.outputs.outcome    == 'failure' ||
          needs.iac-scan.outputs.outcome     == 'failure' ||
          needs.sca-scan.outputs.outcome     == 'failure' ||
          needs.secrets-scan.outputs.outcome == 'failure'
        run: |
          echo "One or more Orca scans failed."
          echo "Check Security tab and artifacts for details."
          exit 1
