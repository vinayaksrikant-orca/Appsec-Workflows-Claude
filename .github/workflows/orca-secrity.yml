# ============================================================
# Orca Security — Combined Scan Workflow (FIXED)
# Fixes:
#   1. shiftleft-sca-action → shiftleft-fs-action (renamed)
#   2. SARIF output path → results/scan.sarif (not a folder)
#   3. Added step IDs for exit_code check on upload
# ============================================================

name: Orca Security Scans

on:
  pull_request:
    types: [opened, synchronize, reopened]   # any branch PR

  push:
    branches:
      - main
      - master

  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  PROJECT_KEY: testing-project-vinayak   # ← replace with your Orca project key

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — SAST
  # Action: shiftleft-sast-action@v1
  # Output: results/sast.sarif
  # ──────────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Orca SAST Scan
        id: orcasecurity_sast_scan          # ← id needed for exit_code
        uses: orcasecurity/shiftleft-sast-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."
          format: "sarif"
          output: "results/"               # ← writes to results/sast.sarif

      - name: Upload SAST SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && steps.orcasecurity_sast_scan.outputs.exit_code != 1 }}
        with:
          sarif_file: results/sast.sarif   # ← exact file not folder
          category: orca-sast

      - name: Upload SAST artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-sast-results
          path: results/sast.sarif
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 2 — IaC
  # Action: shiftleft-iac-action@v1
  # Output: results/iac.sarif
  # ──────────────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Orca IaC Scan
        id: orcasecurity_iac_scan
        uses: orcasecurity/shiftleft-iac-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."                        # ← scan entire repo for IaC files
          format: "sarif"
          output: "results/"              # ← writes to results/iac.sarif

      - name: Upload IaC SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && steps.orcasecurity_iac_scan.outputs.exit_code != 1 }}
        with:
          sarif_file: results/iac.sarif   # ← exact file not folder
          category: orca-iac

      - name: Upload IaC artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-iac-results
          path: results/iac.sarif
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 3 — SCA (dependency scanning)
  # Action: shiftleft-fs-action@v1  ← RENAMED from sca-action
  # Output: results/sca.sarif
  # ──────────────────────────────────────────────────────────
  sca-scan:
    name: SCA Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Orca SCA Scan
        id: orcasecurity_sca_scan
        uses: orcasecurity/shiftleft-fs-action@v1   # ← FIXED name
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."
          format: "sarif"
          output: "results/"              # ← writes to results/sca.sarif

      - name: Upload SCA SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && steps.orcasecurity_sca_scan.outputs.exit_code != 1 }}
        with:
          sarif_file: results/sca.sarif   # ← exact file not folder
          category: orca-sca

      - name: Upload SCA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-sca-results
          path: results/sca.sarif
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 4 — Secrets
  # Action: shiftleft-secrets-action@v1
  # Output: results/secrets.sarif
  # ──────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Orca Secrets Scan
        id: orcasecurity_secrets_scan
        uses: orcasecurity/shiftleft-secrets-action@v1
        with:
          api_token:   ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          format: "sarif"
          output: "results/"             # ← writes to results/secrets.sarif

      - name: Upload Secrets SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && steps.orcasecurity_secrets_scan.outputs.exit_code != 1 }}
        with:
          sarif_file: results/secrets.sarif  # ← exact file not folder
          category: orca-secrets

      - name: Upload Secrets artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orca-secrets-results
          path: results/secrets.sarif
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 5 — Summary (waits for all 4, posts PR comment)
  # Add "Scan Summary" to branch protection required checks
  # ──────────────────────────────────────────────────────────
  scan-summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [sast-scan, iac-scan, sca-scan, secrets-scan]
    if: always()
    steps:

      - name: Print summary
        run: |
          echo "========================================"
          echo "     ORCA SECURITY SCAN SUMMARY         "
          echo "========================================"
          echo "Branch  : ${{ github.head_ref || github.ref_name }}"
          echo "Target  : ${{ github.base_ref || 'push' }}"
          echo "SAST    : ${{ needs.sast-scan.result }}"
          echo "IaC     : ${{ needs.iac-scan.result }}"
          echo "SCA     : ${{ needs.sca-scan.result }}"
          echo "Secrets : ${{ needs.secrets-scan.result }}"
          echo "========================================"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const r = {
              sast:    '${{ needs.sast-scan.result }}',
              iac:     '${{ needs.iac-scan.result }}',
              sca:     '${{ needs.sca-scan.result }}',
              secrets: '${{ needs.secrets-scan.result }}'
            };
            const icon = s => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';
            const anyFail = Object.values(r).some(s => s === 'failure');
            const body = `## 🔐 Orca Security Scan Results
            | Scan | Result |
            |------|--------|
            | SAST | ${icon(r.sast)} ${r.sast} |
            | IaC  | ${icon(r.iac)} ${r.iac} |
            | SCA  | ${icon(r.sca)} ${r.sca} |
            | Secrets | ${icon(r.secrets)} ${r.secrets} |

            **Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
            ${anyFail ? '> ⚠️ Issues found — check the **Security** tab for details.' : '> ✅ All scans passed.'}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if any scan failed
        if: |
          needs.sast-scan.result    == 'failure' ||
          needs.iac-scan.result     == 'failure' ||
          needs.sca-scan.result     == 'failure' ||
          needs.secrets-scan.result == 'failure'
        run: |
          echo "One or more Orca scans failed — check Security tab."
          exit 1
